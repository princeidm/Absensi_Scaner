<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Absensi Scanner GenTasikmalaya</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
    body { font-family: 'Inter', sans-serif; background-color: #f9fafb; }
    #reader { width: 100%; border-radius: 12px; overflow: hidden; border: none !important; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
    #reader video { object-fit: cover; border-radius: 12px; }
  </style>
</head>
<body class="text-gray-800 antialiased h-screen flex items-center justify-center p-4">

  <div id="login-section" class="w-full max-w-md bg-white rounded-2xl shadow-sm border border-gray-100 p-8 space-y-6">
    <div class="text-center">
      <h2 class="text-2xl font-semibold text-gray-900">Akses Sistem</h2>
      <p class="text-sm text-gray-500 mt-1">Sistem Absen Generus</p>
    </div>
    
    <div class="space-y-4">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Nomor WhatsApp</label>
        <input type="number" id="wa-number" placeholder="Contoh: 08123456789" class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-blue-500 outline-none transition-all">
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Kode Masuk</label>
        <input type="password" id="login-code" placeholder="Masukkan 6 digit kode" class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-blue-500 outline-none transition-all">
      </div>
      <button onclick="handleLogin()" id="btn-login" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-3 rounded-xl transition-colors">
        Masuk Akses
      </button>
    </div>
  </div>

  <div id="dashboard-section" class="hidden w-full max-w-md bg-white rounded-2xl shadow-sm border border-gray-100 p-6 flex flex-col h-full max-h-[720px]">
    
    <div class="w-full flex justify-between items-center mb-4">
      <h2 class="text-xl font-semibold text-gray-900">Dashboard Admin</h2>
      <button onclick="logout()" class="text-sm text-red-500 hover:text-red-700 font-medium">Keluar</button>
    </div>

    <div class="flex border-b border-gray-100 mb-6 bg-gray-50 p-1 rounded-xl">
      <button id="tab-scan" onclick="switchTab('scan')" class="w-1/3 py-2 text-xs font-medium rounded-lg text-blue-600 bg-white shadow-sm transition-all">
        Scan Absensi
      </button>
      <button id="tab-register" onclick="switchTab('register')" class="w-1/3 py-2 text-xs font-medium rounded-lg text-gray-500 hover:text-gray-900 transition-all">
        Registrasi QR
      </button>
      <button id="tab-report" onclick="switchTab('report')" class="w-1/3 py-2 text-xs font-medium rounded-lg text-gray-500 hover:text-gray-900 transition-all">
        Panel Admin
      </button>
    </div>
    
    <div id="content-scan" class="w-full flex-grow flex flex-col items-center">
      <div id="reader-container" class="w-full relative flex-grow flex items-center justify-center min-h-[260px]">
        <div id="reader"></div>
      </div>
      <p class="text-xs text-gray-400 text-center mt-4">Pindai QR Code. Data lokasi GPS dan waktu dicatat otomatis.</p>
    </div>

    <div id="content-register" class="hidden w-full flex-grow flex flex-col space-y-4 overflow-y-auto">
      <div class="space-y-3">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Nama Lengkap</label>
          <input type="text" id="reg-nama" placeholder="Masukkan nama peserta" class="w-full px-4 py-2.5 rounded-xl border border-gray-200 focus:ring-2 focus:ring-blue-500 outline-none transition-all text-sm">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Kelompok Sambung</label>
          <input type="text" id="reg-kelompok" placeholder="Contoh: Kelompok A" class="w-full px-4 py-2.5 rounded-xl border border-gray-200 focus:ring-2 focus:ring-blue-500 outline-none transition-all text-sm">
        </div>
        <button onclick="handleRegister()" id="btn-register" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-2.5 rounded-xl text-sm transition-colors shadow-sm">
          Buat QR Code
        </button>
      </div>

      <div id="qr-result-container" class="hidden border border-gray-100 rounded-xl p-4 bg-gray-50 flex flex-col items-center text-center space-y-3">
        <p class="text-xs font-semibold text-green-600 bg-green-50 px-3 py-1 rounded-full">Pendaftaran Berhasil!</p>
        <div class="bg-white p-2 rounded-lg shadow-sm border border-gray-100">
          <img id="qr-image" src="" alt="QR Code" class="w-40 h-40">
        </div>
        <div>
          <h4 id="result-nama" class="font-semibold text-gray-900 text-sm"></h4>
          <p id="result-kode" class="text-xs text-gray-500"></p>
        </div>
        <a id="btn-download-qr" href="#" download="QRCode.png" target="_blank" class="text-xs bg-white text-gray-700 border border-gray-200 px-4 py-2 rounded-lg font-medium hover:bg-gray-100 shadow-sm inline-block">
          Simpan / Unduh QR
        </a>
      </div>
    </div>

    <div id="content-report" class="hidden w-full flex-grow flex flex-col space-y-4 overflow-y-auto pr-1">
      <div class="border-b border-gray-100 pb-2">
        <h3 class="text-sm font-medium text-gray-700">Otomatisasi Laporan Kelompok</h3>
        <p class="text-xs text-gray-400 mt-0.5">Filter data tidak hadir dan broadcast tindak lanjut via WA Web.</p>
      </div>
      <div id="report-list-container" class="space-y-4">
        </div>
    </div>

  </div>

  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbzz5a3HVAS2NUY6JE8rKeyx2O6pf5doWYkKsABHFWzWJDGLT5atOZnVk82Q8jgQLGYD/exec"; 
    
    let html5QrcodeScanner;
    let isScanning = false;
    let currentTab = 'scan';

    window.onload = function() {
      const sessionActive = localStorage.getItem("admin_session_active");
      if (sessionActive === "true") {
        document.getElementById('login-section').classList.add('hidden');
        document.getElementById('dashboard-section').classList.remove('hidden');
        startScanner();
      }
    };

    async function handleLogin() {
      const wa = document.getElementById('wa-number').value;
      const code = document.getElementById('login-code').value;
      const btn = document.getElementById('btn-login');

      if (!wa || !code) return Swal.fire({ icon: 'warning', text: 'Data tidak boleh kosong!' });
      btn.innerText = 'Memverifikasi...';
      btn.disabled = true;

      try {
        const response = await fetch(API_URL, {
          method: 'POST',
          body: JSON.stringify({ action: 'login', wa: wa, kode: code })
        });
        const result = await response.json();

        if (result.success) {
          localStorage.setItem("admin_session_active", "true");
          document.getElementById('login-section').classList.add('hidden');
          document.getElementById('dashboard-section').classList.remove('hidden');
          startScanner(); 
        } else {
          Swal.fire({ icon: 'error', title: 'Gagal', text: result.message });
        }
      } catch (error) {
        Swal.fire({ icon: 'error', title: 'Gagal terhubung ke database', text: 'Periksa setelan CORS / Web App deployment Google Anda.' });
      } finally {
        btn.innerText = 'Masuk Akses';
        btn.disabled = false;
      }
    }

    function switchTab(tab) {
      if (currentTab === tab) return;
      currentTab = tab;

      const tabScanBtn = document.getElementById('tab-scan');
      const tabRegBtn = document.getElementById('tab-register');
      const tabReportBtn = document.getElementById('tab-report');
      
      const contentScan = document.getElementById('content-scan');
      const contentReg = document.getElementById('content-register');
      const contentReport = document.getElementById('content-report');

      const inactiveClass = "w-1/3 py-2 text-xs font-medium rounded-lg text-gray-500 hover:text-gray-900 transition-all";
      const activeClass = "w-1/3 py-2 text-xs font-medium rounded-lg text-blue-600 bg-white shadow-sm transition-all";
      
      tabScanBtn.className = inactiveClass;
      tabRegBtn.className = inactiveClass;
      tabReportBtn.className = inactiveClass;
      
      contentScan.classList.add('hidden');
      contentReg.classList.add('hidden');
      contentReport.classList.add('hidden');

      if (tab === 'scan') {
        tabScanBtn.className = activeClass;
        contentScan.classList.remove('hidden');
        startScanner();
      } else if (tab === 'register') {
        tabRegBtn.className = activeClass;
        contentReg.classList.remove('hidden');
        stopScanner(); 
      } else if (tab === 'report') {
        tabReportBtn.className = activeClass;
        contentReport.classList.remove('hidden');
        stopScanner();
        loadAttendanceSummary();
      }
    }

    // MODIFIKASI UTAMA: Penyesuaian string builder template pesan WA sesuai request
    async function loadAttendanceSummary() {
      const container = document.getElementById('report-list-container');
      container.innerHTML = '<div class="text-center py-8 text-gray-400 text-xs">Menganalisis absensi & menyusun draf...</div>';
      
      try {
        const response = await fetch(API_URL, {
          method: 'POST',
          body: JSON.stringify({ action: 'getSummary' })
        });
        const result = await response.json();
        
        if (result.success) {
          container.innerHTML = '';
          const summary = result.summary;
          
          if (Object.keys(summary).length === 0) {
            container.innerHTML = '<div class="text-center py-8 text-gray-400 text-xs">Belum ada data member dalam database.</div>';
            return;
          }
          
          for (const kelompok in summary) {
            const data = summary[kelompok];
            const leaderPhone = data.leaderPhone || "";
            
            // 1. DRAF STRUKTUR PESAN KHUSUS SESUAI PERMINTAAN USER
            let waText = `Assalamu'alaikum warahmatullahi wabarokatuh,\n\n`;
            waText += `Demikian Bapak Ketua Kelompok yang kami hormati, Generus Kelompok ${kelompok} yang belum menghadiri Amrin Jami' pada hari ini:\n`;
            
            if (data.belumHadir.length === 0) {
              waText += `- Nihil (Semua Anggota Hadir)\n`;
            } else {
              data.belumHadir.forEach((item, i) => {
                // Menampilkan format: 1. Nama 089xxx
                const hpDisplay = item.nomorHp !== "-" ? ` ${item.nomorHp}` : "";
                waText += `${i + 1}. ${item.nama}${hpDisplay}\n`;
              });
            }
            
            waText += `\nMohon sekali amal sholihnya untuk diterobosi via WA/Tlp, ditanyakan apakah dapat menetapi sambung/ijin dengan keterangan bagaimana.\n`;
            waText += `niatkan karena Allah Semoga Allah paring Aman, selamat lancar Barokah,\n`;
            waText += `Alhamdulillahi jazakallahu khairoh`;
            
            // 2. SINKRONISASI TUJUAN UTAMA: Mengirimkan langsung ke nomor target ketua kelompok (?phone=628xx)
            const waLink = `https://api.whatsapp.com/send?phone=${leaderPhone}&text=${encodeURIComponent(waText)}`;
            
            // Pengolahan string untuk tampilan card visual di aplikasi internal HP Admin
            const displayBelumHadir = data.belumHadir.map(item => `${item.nama} (${item.nomorHp})`).join(', ');
            const displayTerlambat = data.terlambat.map(item => `${item.nama} (${item.statusDetail.replace('Terlambat ', '')})`).join(', ');
            
            const card = document.createElement('div');
            card.className = "border border-gray-100 rounded-xl p-4 bg-gray-50 space-y-3 shadow-sm";
            
            card.innerHTML = `
              <div class="flex justify-between items-center border-b border-gray-200 pb-2">
                <h4 class="font-semibold text-gray-900 text-sm">${kelompok}</h4>
                <div class="flex flex-col items-end">
                  <span class="text-[10px] bg-blue-50 text-blue-600 px-2 py-0.5 rounded-full font-medium mb-1">Hadir: ${data.tepatWaktu.length + data.terlambat.length}</span>
                  <span class="text-[9px] text-gray-400">Target Ketua: ${leaderPhone ? '+' + leaderPhone : 'Belum Set'}</span>
                </div>
              </div>
              <div class="space-y-2 text-xs">
                <div>
                  <span class="font-medium text-red-600 block mb-0.5">❌ Belum Hadir (${data.belumHadir.length})</span>
                  <p class="text-gray-600">${data.belumHadir.length > 0 ? displayBelumHadir : '<span class="text-gray-400 italic text-[11px]">Nihil</span>'}</p>
                </div>
                <div>
                  <span class="font-medium text-amber-600 block mb-0.5">⚠️ Terlambat (${data.terlambat.length})</span>
                  <p class="text-gray-600">${data.terlambat.length > 0 ? displayTerlambat : '<span class="text-gray-400 italic text-[11px]">Nihil</span>'}</p>
                </div>
              </div>
              <a href="${waLink}" target="_blank" class="w-full text-center bg-emerald-600 hover:bg-emerald-700 text-white font-medium py-2 rounded-xl text-xs transition-colors shadow-sm block mt-2">
                Kirim Laporan via WA
              </a>
            `;
            container.appendChild(card);
          }
        } else {
          container.innerHTML = `<div class="text-center py-8 text-red-500 text-xs">Gagal: ${result.message}</div>`;
        }
      } catch (error) {
        container.innerHTML = '<div class="text-center py-8 text-red-500 text-xs">Gagal memproses jaringan API server.</div>';
      }
    }

    async function handleRegister() {
      const nama = document.getElementById('reg-nama').value;
      const kelompok = document.getElementById('reg-kelompok').value;
      const btn = document.getElementById('btn-register');

      if (!nama || !kelompok) return Swal.fire({ icon: 'warning', text: 'Nama dan Kelompok wajib diisi!' });
      btn.innerText = 'Membuat Data...';
      btn.disabled = true;

      try {
        const response = await fetch(API_URL, {
          method: 'POST',
          body: JSON.stringify({ action: 'register', nama: nama, kelompok: kelompok })
        });
        const result = await response.json();

        if (result.success) {
          const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(result.qrCode)}`;
          document.getElementById('qr-result-container').classList.remove('hidden');
          document.getElementById('qr-image').src = qrUrl;
          document.getElementById('result-nama').innerText = result.nama;
          document.getElementById('result-kode').innerText = `ID: ${result.qrCode} (${result.kelompok})`;
          document.getElementById('btn-download-qr').href = qrUrl;

          document.getElementById('reg-nama').value = '';
          document.getElementById('reg-kelompok').value = '';
          Swal.fire({ icon: 'success', title: 'QR Dibuat!', text: 'Data tersimpan.', timer: 1500, showConfirmButton: false });
        } else {
          Swal.fire({ icon: 'error', title: 'Gagal', text: result.message });
        }
      } catch (error) {
        Swal.fire({ icon: 'error', title: 'Error', text: 'Gagal mengirim data registrasi.' });
      } finally {
        btn.innerText = 'Buat QR Code';
        btn.disabled = false;
      }
    }

    function startScanner() {
      if (isScanning) return;
      Html5Qrcode.getCameras().then(devices => {
        if (devices && devices.length > 0) {
          let backCamera = devices.find(device => device.label.toLowerCase().includes('back') || device.label.toLowerCase().includes('belakang') || device.label.toLowerCase().includes('environment'));
          let cameraId = backCamera ? backCamera.id : devices[devices.length - 1].id;

          html5QrcodeScanner = new Html5Qrcode("reader");
          const config = { fps: 15, qrbox: { width: 230, height: 230 }, aspectRatio: 1.0 };

          html5QrcodeScanner.start(cameraId, config, onScanSuccess)
            .then(() => { isScanning = true; })
            .catch(err => { fallbackScanner(config); });
        }
      }).catch(err => { console.error("Kamera diblokir"); });
    }

    function fallbackScanner(config) {
      html5QrcodeScanner.start({ facingMode: "environment" }, config, onScanSuccess).then(() => { isScanning = true; });
    }

    function stopScanner() {
      if (html5QrcodeScanner && isScanning) {
        html5QrcodeScanner.stop().then(() => { isScanning = false; });
      }
    }

    async function onScanSuccess(decodedText, decodedResult) {
      if (html5QrcodeScanner.isScanning) html5QrcodeScanner.pause(true);
      
      Swal.fire({ 
        title: 'Memproses Kehadiran...', 
        text: 'Mengambil log lokasi...',
        showConfirmButton: false, 
        allowOutsideClick: false, 
        didOpen: () => { Swal.showLoading(); } 
      });

      async function sendDataToBackend(latitude, longitude) {
        try {
          const response = await fetch(API_URL, {
            method: 'POST',
            body: JSON.stringify({ 
              action: 'scan', 
              qrCode: decodedText,
              lat: latitude,
              lng: longitude
            })
          });
          const result = await response.json();

          if (result.success) {
            const isTelat = result.status.includes("Terlambat");
            
            Swal.fire({
              icon: isTelat ? 'warning' : 'success',
              title: isTelat ? 'Absen Terlambat!' : 'Berhasil Absen!',
              html: `<h3 class="text-xl font-bold text-gray-900">${result.nama}</h3>
                     <p class="text-gray-500 mt-1">${result.kelompok}</p>
                     <span class="inline-block mt-3 px-3 py-1 text-xs font-semibold rounded-full ${isTelat ? 'bg-amber-100 text-amber-800' : 'bg-emerald-100 text-emerald-800'}">${result.status}</span>`,
              timer: 2000,
              showConfirmButton: false
            }).then(() => resumeScanner());
          } else {
            Swal.fire({ icon: 'error', title: 'Gagal', text: result.message, timer: 2000, showConfirmButton: false }).then(() => resumeScanner());
          }
        } catch (error) { 
          Swal.fire({ icon: 'error', title: 'Koneksi Gagal', text: 'Jaringan backend terputus.' }).then(() => resumeScanner());
        }
      }

      navigator.geolocation.getCurrentPosition(
        function(position) {
          sendDataToBackend(position.coords.latitude, position.coords.longitude);
        },
        function(error) {
          sendDataToBackend("GPS Off / Lemah", "GPS Off / Lemah");
        },
        { enableHighAccuracy: false, timeout: 3000 } 
      );
    }

    function resumeScanner() {
      if (html5QrcodeScanner && html5QrcodeScanner.isScanning) html5QrcodeScanner.resume();
    }

    function logout() {
      localStorage.removeItem("admin_session_active");
      stopScanner();
      document.getElementById('dashboard-section').classList.add('hidden');
      document.getElementById('login-section').classList.remove('hidden');
      document.getElementById('qr-result-container').classList.add('hidden');
      document.getElementById('wa-number').value = '';
      document.getElementById('login-code').value = '';
    }
  </script>
</body>
</html>
