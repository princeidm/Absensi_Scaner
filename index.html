<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Absensi Scanner Cepat</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
    body { font-family: 'Inter', sans-serif; background-color: #f9fafb; }
    #reader { width: 100%; border-radius: 12px; overflow: hidden; border: none !important; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
    #reader video { object-fit: cover; border-radius: 12px; }
  </style>
</head>
<body class="text-gray-800 antialiased h-screen flex items-center justify-center p-4">

  <div id="login-section" class="w-full max-w-md bg-white rounded-2xl shadow-sm border border-gray-100 p-8 space-y-6">
    <div class="text-center">
      <h2 class="text-2xl font-semibold text-gray-900">Admin Login</h2>
      <p class="text-sm text-gray-500 mt-1">Sistem Absensi Cepat</p>
    </div>
    
    <div class="space-y-4">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Nomor WhatsApp</label>
        <input type="number" id="wa-number" class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-blue-500 outline-none">
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Kode Masuk</label>
        <input type="password" id="login-code" class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-blue-500 outline-none">
      </div>
      <button onclick="handleLogin()" id="btn-login" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-3 rounded-xl">
        Masuk Akses
      </button>
    </div>
  </div>

  <div id="dashboard-section" class="hidden w-full max-w-md bg-white rounded-2xl shadow-sm border border-gray-100 p-6 flex flex-col items-center h-full max-h-[700px]">
    <div class="w-full flex justify-between items-center mb-6">
      <h2 class="text-xl font-semibold text-gray-900">Live Scan</h2>
      <button onclick="logout()" class="text-sm text-red-500 hover:text-red-700 font-medium">Keluar</button>
    </div>
    
    <div id="reader-container" class="w-full relative flex-grow flex items-center justify-center">
      <div id="reader"></div>
    </div>
    
    <p class="text-sm text-gray-500 text-center mt-6">Arahkan kamera ke QR Code. Sistem akan memindai otomatis.</p>
  </div>

  <script>
    // ===== MASUKKAN URL DEPLOYMENT APPS SCRIPT ANDA DI SINI =====
    const API_URL = "https://script.google.com/macros/s/AKfycbwSd6T2k5kw2o-YZEPz86vJgi_yhgWrL6Tl1O8hkMFBLcIqR_CySbtKvvpduQvcp2v_/exec"; 
    
    let html5QrcodeScanner;
  let isScanning = false;

  async function handleLogin() {
    const wa = document.getElementById('wa-number').value;
    const code = document.getElementById('login-code').value;
    const btn = document.getElementById('btn-login');

    if (!wa || !code) return Swal.fire({ icon: 'warning', text: 'Data tidak boleh kosong!' });

    btn.innerText = 'Memverifikasi...';
    btn.disabled = true;

    try {
      const response = await fetch(API_URL, {
        method: 'POST',
        body: JSON.stringify({ action: 'login', wa: wa, kode: code })
      });
      const result = await response.json();

      if (result.success) {
        document.getElementById('login-section').classList.add('hidden');
        document.getElementById('dashboard-section').classList.remove('hidden');
        startScanner();
      } else {
        Swal.fire({ icon: 'error', title: 'Gagal', text: result.message });
      }
    } catch (error) {
      Swal.fire({ icon: 'error', title: 'Network Error', text: 'Gagal terhubung ke database.' });
    } finally {
      btn.innerText = 'Masuk Akses';
      btn.disabled = false;
    }
  }

  // FUNGSI BARU: Jauh lebih stabil untuk HP modern dengan banyak kamera
  function startScanner() {
    if (isScanning) return;

    Swal.fire({
      title: 'Menginisialisasi Kamera...',
      allowOutsideClick: false,
      didOpen: () => { Swal.showLoading(); }
    });

    // Langkah 1: Minta daftar semua kamera yang ada di HP
    Html5Qrcode.getCameras().then(devices => {
      Swal.close();
      if (devices && devices.length > 0) {
        // Logika memilih kamera belakang yang tepat
        let backCamera = devices.find(device => device.label.toLowerCase().includes('back') || device.label.toLowerCase().includes('belakang') || device.label.toLowerCase().includes('environment'));
        
        // Jika label tidak jelas, pilih kamera terakhir dalam daftar (biasanya kamera belakang utama)
        let cameraId = backCamera ? backCamera.id : devices[devices.length - 1].id;

        html5QrcodeScanner = new Html5Qrcode("reader");
        const config = { 
          fps: 15, 
          qrbox: { width: 250, height: 250 }, 
          aspectRatio: 1.0 
        };

        // Langkah 2: Jalankan scanner menggunakan ID Kamera yang spesifik
        html5QrcodeScanner.start(cameraId, config, onScanSuccess)
          .then(() => { isScanning = true; })
          .catch(err => {
            // Jika gagal karena masalah spesifik kamera, coba mode fallback (kamera standar)
            fallbackScanner(config);
          });
      } else {
        Swal.fire({ icon: 'error', title: 'Kamera Tidak Ditemukan', text: 'Perangkat ini tidak memiliki kamera aktif.' });
      }
    }).catch(err => {
      Swal.close();
      // Jika langkah pertama diblokir total oleh browser
      Swal.fire({ 
        icon: 'error', 
        title: 'Izin Ditolak Browser', 
        text: 'Pastikan URL dimulai dengan HTTPS dan Anda memilih "Izinkan" saat browser meminta akses kamera.' 
      });
    });
  }

  // Fungsi Fallback jika penyeleksian ID Kamera gagal
  function fallbackScanner(config) {
    html5QrcodeScanner.start({ facingMode: "environment" }, config, onScanSuccess)
      .then(() => { isScanning = true; })
      .catch(err => {
        Swal.fire({ icon: 'error', title: 'Akses Kamera Gagal', text: 'Browser memblokir live streaming video.' });
      });
  }

  async function onScanSuccess(decodedText, decodedResult) {
    if (html5QrcodeScanner.isScanning) {
      html5QrcodeScanner.pause(true); // Jeda pemindaian agar tidak terkirim ganda
    }

    Swal.fire({ title: 'Mencatat...', showConfirmButton: false, timer: 800, didOpen: () => { Swal.showLoading(); } });

    try {
      const response = await fetch(API_URL, {
        method: 'POST',
        body: JSON.stringify({ action: 'scan', qrCode: decodedText })
      });
      const result = await response.json();

      if (result.success) {
        Swal.fire({
          icon: 'success',
          title: 'Berhasil Absen!',
          html: `<h3 class="text-xl font-bold text-gray-900">${result.nama}</h3><p class="text-gray-500 mt-1">${result.kelompok}</p>`,
          timer: 2000,
          showConfirmButton: false
        }).then(() => resumeScanner());
      } else {
        Swal.fire({ icon: 'error', title: 'Ditolak', text: result.message, timer: 2000, showConfirmButton: false })
          .then(() => resumeScanner());
      }
    } catch (error) {
      resumeScanner();
    }
  }

  function resumeScanner() {
    if (html5QrcodeScanner && html5QrcodeScanner.isScanning) html5QrcodeScanner.resume();
  }

  function logout() {
    if (html5QrcodeScanner && isScanning) {
      html5QrcodeScanner.stop().then(() => {
        isScanning = false;
      });
    }
    document.getElementById('dashboard-section').classList.add('hidden');
    document.getElementById('login-section').classList.remove('hidden');
  }
</script>
  </script>
</body>
</html>
